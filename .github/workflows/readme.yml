name: GitHub Metrics

on:
  schedule:
    - cron: "0 0 * * *"   # Runs daily
  workflow_dispatch:

jobs:
  github-metrics:
    runs-on: ubuntu-latest

    steps:
      - name: Generate Metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user: myProwess

          # 🔥 Enable Top Repositories by Stars
          base: repositories
          plugin_repositories: yes
          plugin_repositories_featured: yes
          plugin_repositories_order: starred
          plugin_repositories_limit: 6
